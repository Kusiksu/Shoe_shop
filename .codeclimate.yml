# Code Climate: https://codeclimate.com — подключите репозиторий в веб-интерфейсе,
# затем вставьте бейдж Maintainability в README (см. раздел README).
version: "2"
checks:
  file-lines:
    config:
      threshold: 500
plugins:
  duplication:
    enabled: true
    config:
      languages:
        python:
          python_version: 3
  fixme:
    enabled: true
exclude_patterns:
  - "**/__pycache__/"
  - "**/.ruff_cache/"
  - "**/data/"
  - "**/resources/products/"
  - "**/*.pdf"
  - "**/*.xlsx"
  - "**/*.ico"
  - "**/*.png"
